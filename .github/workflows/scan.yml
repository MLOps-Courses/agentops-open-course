# Security scanning: history, source, infrastructure, dependencies, images, and licenses.
name: Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

concurrency:
  group: scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so gitleaks can inspect every commit

      - name: Install the pinned security tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Scan history, dependencies, secrets, and infrastructure
        run: mise run secure

  containers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent
            context: agents
            dockerfile: agents/python/Dockerfile
            image: agentops-agent:scan
          - name: mlflow
            context: infra/mlflow
            dockerfile: infra/mlflow/Dockerfile
            image: agentops-mlflow:scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build ${{ matrix.name }} image
        run: docker build --file "${{ matrix.dockerfile }}" --tag "${{ matrix.image }}" "${{ matrix.context }}"

      - name: Scan ${{ matrix.name }} image vulnerabilities and secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          trivy-config: trivy.yaml
          version: v0.72.0
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Verify ${{ matrix.name }} image licenses
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          trivy-config: trivy.yaml
          version: v0.72.0
          scanners: license
          severity: UNKNOWN,HIGH,CRITICAL
          exit-code: "1"
