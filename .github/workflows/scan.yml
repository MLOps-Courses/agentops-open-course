# Security scanning: leaked secrets (gitleaks, full history) and filesystem vulnerabilities (Trivy).
name: Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

concurrency:
  group: scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so gitleaks can inspect every commit

      - name: Install the pinned security tools
        uses: jdx/mise-action@v4

      - name: Scan history, dependencies, secrets, and infrastructure
        run: mise run secure

  containers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: agent
            context: agents
            dockerfile: agents/python/Dockerfile
            image: agentops-agent:scan
          - name: mlflow
            context: infra/mlflow
            dockerfile: infra/mlflow/Dockerfile
            image: agentops-mlflow:scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build ${{ matrix.name }} image
        run: docker build --file "${{ matrix.dockerfile }}" --tag "${{ matrix.image }}" "${{ matrix.context }}"

      - name: Scan ${{ matrix.name }} image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
