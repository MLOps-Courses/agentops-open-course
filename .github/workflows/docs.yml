# Build the course documentation (Zensical) and publish it to GitHub Pages.
name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install tools using mise
        uses: jdx/mise-action@v4

      - name: Validate and build the site
        run: mise run check:docs

      - name: Upload Pages artifact
        if: ${{ github.event.repository.has_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Explain why deployment is skipped
        if: ${{ !github.event.repository.has_pages }}
        run: echo "::notice::Docs validated; Pages deployment is disabled for this repository."

  deploy:
    needs: build
    if: ${{ github.event.repository.has_pages }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
