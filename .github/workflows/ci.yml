# Lint, type-check, and test the Python agent. Same `mise run` tasks as the local git hooks.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install tools using mise
        uses: jdx/mise-action@v4

      - name: Check formatting (dprint) — mirrors the pre-commit hook
        run: dprint check

      - name: Lint GitHub Actions workflows (actionlint) — mirrors the pre-commit hook
        run: actionlint

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install tools using mise
        uses: jdx/mise-action@v4

      - name: Install, check, and test
        run: |
          mise run install
          mise run check
          mise run test
