name: Bug report
description: Report a reproducible defect in the agent, infrastructure, or repository tooling.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets or sensitive data. Security reports belong in SECURITY.md.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Reference agent
        - Local infrastructure
        - Kubernetes or GKE manifests
        - Repository tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and why it is incorrect.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Include the exact working directory and commands, with credentials removed.
      placeholder: |
        1. Run ...
        1. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, container runtime, relevant tool versions, and commit SHA.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste the smallest useful log excerpt. Remove tokens and personal data.
      render: text
