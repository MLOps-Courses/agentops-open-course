apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentgateway
    app.kubernetes.io/part-of: agentops-open-course
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentgateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentgateway
        app.kubernetes.io/part-of: agentops-open-course
    spec:
      serviceAccountName: agentgateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agentgateway
          image: cr.agentgateway.dev/agentgateway:v1.3.1@sha256:c3ce7b75da90fef70239befcc1c3adc05152d7b9dd21fcb8351178026a2c4381
          imagePullPolicy: IfNotPresent
          args: ["-f", "/etc/agentgateway/config.yaml"]
          ports:
            - name: mcp
              containerPort: 3000
            - name: a2a
              containerPort: 3001
            - name: llm
              containerPort: 4000
            - name: metrics
              containerPort: 15020
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /etc/agentgateway
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: agentgateway-config
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agentgateway
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentgateway
    app.kubernetes.io/part-of: agentops-open-course
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentgateway
  ports:
    - name: mcp
      port: 3000
      targetPort: mcp
    - name: a2a
      port: 3001
      targetPort: a2a
    - name: llm
      port: 4000
      targetPort: llm
    - name: metrics
      port: 15020
      targetPort: metrics
