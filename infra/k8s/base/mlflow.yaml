apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow
  namespace: agentops
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: agentops-open-course
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: agentops
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: agentops-open-course
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
        app.kubernetes.io/part-of: agentops-open-course
    spec:
      serviceAccountName: mlflow
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        runAsGroup: 10002
        fsGroup: 10002
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mlflow
          image: agentops-mlflow:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: MLFLOW_ARTIFACTS_DESTINATION
              value: /var/lib/mlflow/artifacts
            - name: MLFLOW_DEFAULT_ARTIFACT_ROOT
              value: mlflow-artifacts:/
            - name: MLFLOW_EXPERIMENT_NAME
              value: agentops-agent
          ports:
            - name: http
              containerPort: 5000
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /var/lib/mlflow
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mlflow
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: agentops
  labels:
    app.kubernetes.io/name: mlflow
    app.kubernetes.io/part-of: agentops-open-course
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: http
