apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentops-mcp
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops-mcp
    app.kubernetes.io/part-of: agentops-open-course
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentops-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentops-mcp
        app.kubernetes.io/part-of: agentops-open-course
    spec:
      serviceAccountName: agentops-mcp
      # Exceeds the MCP Uvicorn drain window (AGENT_DRAIN_TIMEOUT_S=10) so
      # rotation gives in-flight read tools time to finish before SIGKILL.
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp
          image: agentops-agent:dev
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "agent.mcp_server"]
          env:
            - name: MCP_HOST
              value: 0.0.0.0
            - name: MCP_PORT
              value: "8000"
            - name: MCP_TRANSPORT
              value: streamable-http
            - name: MCP_ALLOWED_HOSTS
              value: agentgateway,agentgateway:*,agentgateway.agentops.svc.cluster.local,agentgateway.agentops.svc.cluster.local:*,agentops-mcp,agentops-mcp:*,agentops-mcp.agentops.svc.cluster.local,agentops-mcp.agentops.svc.cluster.local:*
            - name: AGENT_DATA_DIR
              value: /app/data
            - name: AGENT_STATE_DIR
              value: /app/state
          ports:
            - name: mcp
              containerPort: 8000
          # Real HTTP probes (Ch. 6): readiness verifies the seed dataset and
          # writable state, not merely an open port. Startup covers the slow
          # first boot (Presidio model load) so liveness can stay tight.
          startupProbe:
            httpGet:
              path: /livez
              port: mcp
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: mcp
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: mcp
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: state
              mountPath: /app/state
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: agentops-agent-state
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agentops-mcp
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops-mcp
    app.kubernetes.io/part-of: agentops-open-course
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentops-mcp
  ports:
    - name: mcp
      port: 8000
      targetPort: mcp
