# Nightly online-safe snapshot of the agent state (sessions, A2A tasks, and
# the append-only audit trail) into a second PVC. Uses the course image and
# the Python stdlib sqlite3 backup API, so there is no new image pin and no
# plain `cp` of a live database. A backup PVC in the same single-node cluster
# is crash/mistake recovery for the lab, not disaster recovery, and
# `skaffold delete` removes both PVCs together.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentops-state-backup
  namespace: agentops
automountServiceAccountToken: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentops-state-backups
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops-state-backup
    app.kubernetes.io/part-of: agentops-open-course
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentops-state-backup
  namespace: agentops
  labels:
    app.kubernetes.io/name: agentops-state-backup
    app.kubernetes.io/part-of: agentops-open-course
spec:
  schedule: "30 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: agentops-state-backup
        app.kubernetes.io/part-of: agentops-open-course
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app.kubernetes.io/name: agentops-state-backup
            app.kubernetes.io/part-of: agentops-open-course
        spec:
          serviceAccountName: agentops-state-backup
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: agentops-agent:dev
              imagePullPolicy: IfNotPresent
              command: ["python", "-c"]
              # sqlite3.Connection.backup takes the source's read lock page by
              # page, so the copy is consistent even while the MCP/agent pods
              # keep writing. Retention keeps the newest 7 snapshots.
              args:
                - |
                  import datetime
                  import pathlib
                  import shutil
                  import sqlite3
                  import sys

                  state = pathlib.Path("/app/state")
                  backups = pathlib.Path("/backups")
                  databases = sorted(state.glob("*.db"))
                  if not databases:
                      sys.exit("no SQLite databases under /app/state; deploy the agent first")
                  stamp = datetime.datetime.now(datetime.UTC).strftime("%Y%m%dT%H%M%SZ")
                  snapshot = backups / stamp
                  snapshot.mkdir(parents=True)
                  for database in databases:
                      source = sqlite3.connect(database)
                      target = sqlite3.connect(snapshot / database.name)
                      with target:
                          source.backup(target)
                      status = target.execute("PRAGMA integrity_check").fetchone()[0]
                      source.close()
                      target.close()
                      if status != "ok":
                          sys.exit(f"integrity check failed for {database.name}: {status}")
                      print(f"backed up {database.name} -> {snapshot / database.name}", flush=True)
                  for old in sorted(path for path in backups.iterdir() if path.is_dir())[:-7]:
                      shutil.rmtree(old)
                      print(f"pruned {old}", flush=True)
                  print(f"snapshot complete: {snapshot}", flush=True)
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: state
                  mountPath: /app/state
                - name: backups
                  mountPath: /backups
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: agentops-agent-state
            - name: backups
              persistentVolumeClaim:
                claimName: agentops-state-backups
