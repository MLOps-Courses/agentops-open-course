# Local-overlay Prometheus: evaluates the course alert rules against the
# collector's exported metrics. The GKE overlay intentionally ships no
# scraper; operators point their own Prometheus at otel-collector:8889.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: agentops
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: agentops
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: agentops-open-course
spec:
  replicas: 1
  # Recreate: a single TSDB writer on an emptyDir gains nothing from a surge
  # pod and keeps the namespace ResourceQuota headroom small.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: agentops-open-course
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        # The prom images run as nobody rather than the course's 10001.
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v3.13.0@sha256:c6b27ea434f8389bfe233fbc7be381cf50587c286e871bc842008f5a1b1908a7
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            # Metrics are derived and rebuildable, so an emptyDir with a
            # short retention keeps the lab light instead of a PVC.
            - --storage.tsdb.retention.time=2d
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir:
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: agentops
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: agentops-open-course
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
