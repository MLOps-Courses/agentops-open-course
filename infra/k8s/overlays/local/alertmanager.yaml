# Local-overlay Alertmanager: groups the alerts Prometheus fires. It has no
# egress exception, so notifications stay in the cluster by design; read them
# through `kubectl -n agentops port-forward svc/alertmanager 9093:9093`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  namespace: agentops
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: agentops
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: agentops-open-course
spec:
  replicas: 1
  # Recreate: silences live in an emptyDir; a surge pod would only cost
  # ResourceQuota headroom for a stateless single-replica lab component.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/part-of: agentops-open-course
    spec:
      serviceAccountName: alertmanager
      securityContext:
        runAsNonRoot: true
        # The prom images run as nobody rather than the course's 10001.
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.33.1@sha256:9e082985f56f4c8c9f724e18f2288c6708f472e56a5286b8863d080434ea065d
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - name: http
              containerPort: 9093
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: agentops
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: agentops-open-course
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: http
