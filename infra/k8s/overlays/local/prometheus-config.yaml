# In-cluster Prometheus scrapes only the collector: agentgateway metrics are
# already re-exported through otel-collector:8889, and MLflow /metrics stays
# host-only so the mlflow-ingress policy keeps its single-writer contract.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]
