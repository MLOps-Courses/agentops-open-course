global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/agentops.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]
  - job_name: mlflow
    metrics_path: /metrics
    static_configs:
      - targets: [mlflow:5000]
  - job_name: agentgateway
    static_configs:
      - targets: [host.docker.internal:15020]
