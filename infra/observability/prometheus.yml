# Prometheus scrape config for the Ops Copilot's local stack (Chapter 7.2).
# It pulls metrics from the OpenTelemetry Collector's Prometheus exporter, which is where
# the agent's OTLP metrics (latency, tokens, tool calls) land — see otel-collector.yaml.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"] # the collector's Prometheus exporter (compose network)
