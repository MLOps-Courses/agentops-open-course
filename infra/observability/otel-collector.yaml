# OpenTelemetry Collector config for the Ops Copilot's local stack (Chapter 7).
# Receives OTLP from the agent, then fans out: traces → Jaeger, metrics → Prometheus.
# This is the "one pipeline, many backends" the docs describe — the agent only ever
# talks OTLP to this collector; where the data lands is decided here, not in the agent.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {} # batch exports for efficiency; defaults are fine for a local stack

exporters:
  # Traces → Jaeger over OTLP/gRPC (plain HTTP inside the compose network).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Metrics → a Prometheus scrape endpoint the prometheus service pulls from.
  prometheus:
    endpoint: 0.0.0.0:8889
  # Everything also to stdout so `docker compose logs otel-collector` shows the flow.
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
