# One vendor-neutral OTLP entry point. MLflow stores traces, Loki stores logs,
# and Prometheus scrapes both native metrics and RED metrics derived by
# spanmetrics.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100
  batch: {}

connectors:
  span_metrics:
    namespace: agentops
    metrics_flush_interval: 5s
    histogram:
      unit: s
      explicit:
        buckets: [100ms, 250ms, 500ms, 1s, 2s, 5s, 10s, 30s]
    dimensions:
      - name: gen_ai.operation.name
      - name: gen_ai.request.model
      - name: error.type

exporters:
  otlp_http/mlflow:
    endpoint: http://mlflow:5000
    headers:
      x-mlflow-experiment-id: "0"
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
  prometheus:
    endpoint: 0.0.0.0:8889
    enable_open_metrics: true

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_http/mlflow, span_metrics]
    metrics:
      receivers: [otlp, span_metrics]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp_http/loki]
