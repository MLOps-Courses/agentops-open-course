# Local observability stack for the Ops Copilot (Chapter 7).
#
# One OTLP pipeline, three backends — exactly the story of 7.1–7.3:
#   agent --(OTLP :4318)--> otel-collector --> Jaeger (traces)   http://localhost:16686
#                                          \--> Prometheus (metrics) http://localhost:9090
#                                                     Grafana (dashboards)  http://localhost:3001
#
# Everything here is 100% open source (Apache-2.0 / AGPLv3), self-hosted, no accounts.
# Bring it up, point the agent at the collector, and the whole chapter lights up:
#   docker compose -f infra/observability/compose.yaml up -d
#   # then in your .env (the agent reads it):
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
#   OTEL_SERVICE_NAME=ops-copilot
#
# Image tags are pinned for reproducibility — re-verify/bump at setup time (these move fast).
services:
  # The single OTLP entrypoint. Receives the agent's spans/metrics/logs and fans them out.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318" # OTLP/HTTP — the endpoint the agent targets
      - "4317:4317" # OTLP/gRPC — the alternative transport
    depends_on:
      - jaeger

  # Traces backend + UI. COLLECTOR_OTLP_ENABLED lets it receive OTLP straight from the collector.
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI — the trace tree from 7.1

  # Metrics backend. Scrapes the collector's Prometheus exporter (see otel-collector.yaml).
  prometheus:
    image: prom/prometheus:v3.0.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090" # Prometheus UI — the SLIs from 7.2

  # Dashboards over Prometheus + Jaeger (both auto-provisioned as datasources).
  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true" # local-only convenience: no login for the course
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    ports:
      - "3001:3000" # Grafana UI on :3001 (3000 is the gateway's, Ch. 5)
    depends_on:
      - prometheus
      - jaeger
