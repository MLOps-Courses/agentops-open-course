# https://mise.jdx.dev
# AgentOps Ops Copilot dataset — the single source of truth for the reference agent.
# `incidents.db` is generated from sql/schema.sql + sql/seed.sql and committed so the
# agent runs offline out of the box; regenerate it whenever the SQL changes.

[tools]
sqlite = "latest"

[tasks.build]
alias = "b"
description = "(Re)build incidents.db from sql/schema.sql + sql/seed.sql"
run = "rm -f incidents.db && sqlite3 incidents.db < sql/schema.sql && sqlite3 incidents.db < sql/seed.sql"

[tasks.check]
alias = "c"
# A row-count probe, not a drift diff: it confirms incidents.db is present and seeded (catches a
# missing or empty DB), but does not prove it matches the current SQL — rebuild after SQL edits.
description = "Sanity-check incidents.db is present and seeded (rebuild with `mise run build` after SQL edits)"
run = [
  "test \"$(sqlite3 incidents.db 'SELECT count(*) FROM incidents;')\" -gt 0",
  "test \"$(sqlite3 incidents.db 'SELECT count(*) FROM services;')\" -gt 0",
]

[tasks.clean]
alias = "n"
description = "Remove the generated database"
run = "rm -f incidents.db"
