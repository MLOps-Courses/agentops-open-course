# https://www.mkdocs.org/user-guide/configuration/
# Read natively by Zensical (https://zensical.org). We keep the config in mkdocs.yml
# while Zensical is alpha; migrate to zensical.toml once it reaches 1.0.

# Project information
site_author: MLOps Courses
site_name: AgentOps Open Course
site_url: https://agentops-open-course.fmind.dev/
site_description: Build, evaluate, secure, deploy, and operate an AI agent with an open-source Google ADK, agentgateway, kagent, MLflow, and OpenTelemetry stack.

# Repository
repo_name: MLOps-Courses/agentops-open-course
repo_url: https://github.com/MLOps-Courses/agentops-open-course
edit_uri: edit/main/docs/

# Copyright
copyright: Copyright &copy; MLOps Courses

# Configs
strict: true
use_directory_urls: false

# Theme
theme:
  name: material
  palette:
    scheme: default
    primary: indigo
  features:
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

# Navigation is explicit so adding an asset or a new cloud profile cannot silently
# reorder the learning path. Chapter index pages remain clickable section entries.
nav:
  - Home: index.md
  - 0. Overview:
      - Overview: 0. Overview/index.md
      - 0.0. Course: 0. Overview/0.0. Course.md
      - 0.1. Agents: 0. Overview/0.1. Agents.md
      - 0.2. AgentOps: 0. Overview/0.2. AgentOps.md
      - 0.3. Ecosystem: 0. Overview/0.3. Ecosystem.md
      - 0.4. Providers: 0. Overview/0.4. Providers.md
